<!-- @dsCard group="GitBench" viewport="1380x860" subtitle="Welcome → ana pencere — tam etkileşimli kit" name="GitBench App" -->
<!DOCTYPE html>
<html lang="tr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitBench UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../gb-card-loader.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  ::-webkit-scrollbar { width: 13px; }
  ::-webkit-scrollbar-thumb { background: rgba(128,128,134,.4); border-radius: 99px; border: 3.5px solid transparent; background-clip: padding-box; }
</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const KIT_FILES = [
  "components/core/Button.jsx", "components/core/SegmentedControl.jsx", "components/core/Badge.jsx", "components/core/DiffStat.jsx",
  "components/navigation/WorktreeRow.jsx", "components/navigation/FileRow.jsx",
  "components/diff/DiffFileHeader.jsx", "components/diff/HunkHeader.jsx", "components/diff/DiffLine.jsx",
  "components/overlays/ContextMenu.jsx", "components/overlays/AlertDialog.jsx", "components/overlays/FloatBar.jsx",
  "ui_kits/gitbench/WelcomeWindow.jsx", "ui_kits/gitbench/MainWindow.jsx",
];
gbLoad("../../", KIT_FILES, ["MainWindow", "WelcomeWindow"]).then((NS) => {
const { MainWindow, WelcomeWindow } = NS;

function Kit() {
  const [light, setLight] = React.useState(false);
  const [project, setProject] = React.useState(true);
  return (
    <div data-theme={light ? "light" : undefined}
      style={{ position: "fixed", inset: 0, background: "var(--gb-desktop)", display: "flex", alignItems: "center", justifyContent: "center", transition: "background var(--gb-dur-theme) var(--gb-ease)" }}>
      {project
        ? <MainWindow light={light} onToggleTheme={() => setLight(!light)} onCloseProject={() => setProject(false)} width={1240} height={760}></MainWindow>
        : <WelcomeWindow onOpen={() => setProject(true)}></WelcomeWindow>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Kit></Kit>);
});
</script>
</body></html>
