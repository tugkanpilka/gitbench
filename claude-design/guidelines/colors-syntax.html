<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; font-family: var(--gb-font-mono); display: flex; }
.half { flex: 1; background: var(--gb-bg); padding: 14px 16px; }
.code { font-size: 12px; line-height: 1.7; white-space: pre; }
.leg { display: flex; flex-wrap: wrap; gap: 4px 12px; margin-top: 10px; }
.leg span { font-size: 10px; font-family: var(--gb-font-ui); color: var(--gb-dim); }
.leg i { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 4px; }
</style></head><body>
<div class="half">
  <div class="code"><span style="color: var(--gb-syn-cm);">// session güncelle</span>
<span style="color: var(--gb-syn-kw);">export async function</span> <span style="color: var(--gb-syn-fn);">create</span><span style="color: var(--gb-syn-pl);">(id: </span><span style="color: var(--gb-syn-ty);">string</span><span style="color: var(--gb-syn-pl);">) {</span>
<span style="color: var(--gb-syn-pl);">  return store.</span><span style="color: var(--gb-syn-pr);">put</span><span style="color: var(--gb-syn-pl);">(</span><span style="color: var(--gb-syn-str);">"sid"</span><span style="color: var(--gb-syn-pl);">, </span><span style="color: var(--gb-syn-num);">1800</span><span style="color: var(--gb-syn-pl);">);</span>
<span style="color: var(--gb-syn-pl);">}</span></div>
  <div class="leg">
    <span><i style="background: var(--gb-syn-kw);"></i>kw</span><span><i style="background: var(--gb-syn-fn);"></i>fn</span><span><i style="background: var(--gb-syn-str);"></i>str</span><span><i style="background: var(--gb-syn-num);"></i>num</span><span><i style="background: var(--gb-syn-ty);"></i>ty</span><span><i style="background: var(--gb-syn-pr);"></i>pr</span><span><i style="background: var(--gb-syn-cm);"></i>cm</span>
  </div>
</div>
<div class="half" data-theme="light">
  <div class="code"><span style="color: var(--gb-syn-cm);">// session güncelle</span>
<span style="color: var(--gb-syn-kw);">export async function</span> <span style="color: var(--gb-syn-fn);">create</span><span style="color: var(--gb-syn-pl);">(id: </span><span style="color: var(--gb-syn-ty);">string</span><span style="color: var(--gb-syn-pl);">) {</span>

  <div class="leg">
    <span><i style="background: var(--gb-syn-kw);"></i>kw</span><span><i style="background: var(--gb-syn-fn);"></i>fn</span><span><i style="background: var(--gb-syn-str);"></i>str</span><span><i style="background: var(--gb-syn-num);"></i>num</span><span><i style="background: var(--gb-syn-ty);"></i>ty</span><span><i style="background: var(--gb-syn-pr);"></i>pr</span><span><i style="background: var(--gb-syn-cm);"></i>cm</span>
