<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; font-family: var(--gb-font-ui); background: var(--gb-bg); padding: 14px 16px; display: flex; gap: 28px; }
.col { flex: 1; }
.h { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
.bar { background: var(--gb-accent-bg); border: 1px solid var(--gb-accent); border-radius: 3px; flex: none; width: 120px; }
.h span { font-size: 10px; color: var(--gb-dim); font-family: var(--gb-font-mono); }
.sp { display: flex; align-items: flex-end; gap: 8px; height: 60px; margin-top: 6px; }
.sp div { width: 22px; background: var(--gb-accent); border-radius: 2px; opacity: .8; }
.sp span { font-size: 9px; color: var(--gb-faint); font-family: var(--gb-font-mono); display: block; text-align: center; margin-top: 3px; }
.cap { font-size: 10px; color: var(--gb-faint); margin-top: 6px; }
</style></head><body>
<div class="col">
  <div class="h"><div class="bar" style="height: 38px;"></div><span>38 · file header</span></div>
  <div class="h"><div class="bar" style="height: 25px;"></div><span>25 · sidebar satırı</span></div>
  <div class="h"><div class="bar" style="height: 24px;"></div><span>24 · diff satırı</span></div>
  <div class="h"><div class="bar" style="height: 22px;"></div><span>22 · compact satır</span></div>
</div>
<div class="col">
  <div style="display: flex; gap: 8px;">
    <div><div class="sp"><div style="height: 2px;"></div></div><span style="font-size: 9px; color: var(--gb-faint); font-family: var(--gb-font-mono);">2</span></div>
    <div><div class="sp"><div style="height: 4px;"></div></div><span style="font-size: 9px; color: var(--gb-faint); font-family: var(--gb-font-mono);">4</span></div>
    <div><div class="sp"><div style="height: 6px;"></div></div><span style="font-size: 9px; color: var(--gb-faint); font-family: var(--gb-font-mono);">6</span></div>
    <div><div class="sp"><div style="height: 8px;"></div></div><span style="font-size: 9px; color: var(--gb-faint); font-family: var(--gb-font-mono);">8</span></div>
    <div><div class="sp"><div style="height: 12px;"></div></div><span style="font-size: 9px; color: var(--gb-faint); font-family: var(--gb-font-mono);">12</span></div>
    <div><div class="sp"><div style="height: 16px;"></div></div><span style="font-size: 9px; color: var(--gb-faint); font-family: var(--gb-font-mono);">16</span></div>
    <div><div class="sp"><div style="height: 24px;"></div></div><span style="font-size: 9px; color: var(--gb-faint); font-family: var(--gb-font-mono);">24</span></div>
  </div>
  <div class="cap">--gb-space-1…7 · sidebar 264px sabit</div>
</div>
</body></html>
