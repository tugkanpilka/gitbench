<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; font-family: var(--gb-font-ui); background: var(--gb-bg); padding: 16px; }
.row { display: flex; gap: 10px; }
.sw { flex: 1; height: 76px; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; box-sizing: border-box; }
.sw b { font-size: 11px; color: var(--gb-text); font-weight: 500; }
.sw span { font-size: 10px; color: var(--gb-dim); font-family: var(--gb-font-mono); }
</style></head><body>
<div class="row">
  <div class="sw" style="background: var(--gb-bg); outline: 1px solid var(--gb-border);"><b>İçerik</b><span>--gb-bg</span></div>
  <div class="sw" style="background: var(--gb-panel);"><b>Panel</b><span>--gb-panel</span></div>
  <div class="sw" style="background: var(--gb-sidebar);"><b>Sidebar ¹</b><span>--gb-sidebar</span></div>
  <div class="sw" style="background: var(--gb-border);"><b>Border</b><span>--gb-border</span></div>
  <div class="sw" style="background: var(--gb-border-soft);"><b>Border soft</b><span>--gb-border-soft</span></div>
</div>
<div style="font-size: 10px; color: var(--gb-faint); margin-top: 8px;">¹ translucent — daima --gb-vibrancy backdrop-filter ile</div>
</body></html>
