<!-- @dsCard group="Type" viewport="700x190" subtitle="SF Pro UI ölçeği — 10.5–13px bandı + ağırlıklar" name="UI Type Scale" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; font-family: var(--gb-font-ui); background: var(--gb-bg); padding: 14px 16px; }
.r { display: flex; align-items: baseline; gap: 12px; padding: 4px 0; }
.r code { font-family: var(--gb-font-mono); font-size: 10px; color: var(--gb-faint); width: 150px; flex: none; }
</style></head><body>
<div class="r"><code>--gb-text-xl · 700</code><span style="font-size: var(--gb-text-xl); font-weight: 700; color: var(--gb-text); letter-spacing: var(--gb-tracking-tight);">GitBench</span></div>
<div class="r"><code>--gb-text-base · 600</code><span style="font-size: var(--gb-text-base); font-weight: 600; color: var(--gb-text);">auth-refactor</span></div>
<div class="r"><code>--gb-text-md · 500</code><span style="font-size: var(--gb-text-md); font-weight: 500; color: var(--gb-text);">Worktree'yi Kaldır…</span></div>
<div class="r"><code>--gb-text-sm · 400</code><span style="font-size: var(--gb-text-sm); color: var(--gb-dim);">Bir worktree ekleyince diff'leri burada göreceksin.</span></div>
<div class="r"><code>--gb-text-xs · 600 caps</code><span style="font-size: var(--gb-text-xs); font-weight: 600; color: var(--gb-faint); text-transform: uppercase; letter-spacing: var(--gb-tracking-caps);">Worktrees</span></div>
<div class="r"><code>--gb-text-2xs · 400</code><span style="font-size: var(--gb-text-2xs); color: var(--gb-faint);">2 dk önce</span></div>
</body></html>
