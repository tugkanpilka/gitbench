<!-- @dsCard group="Colors" viewport="700x170" subtitle="Vurgu, seçim ve etkileşim zeminleri — iki temada" name="Accent & Selection" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; font-family: var(--gb-font-ui); display: flex; }
.half { flex: 1; background: var(--gb-bg); padding: 14px 16px; }
.chips { display: flex; flex-direction: column; gap: 6px; }
.chip { display: flex; align-items: center; gap: 8px; }
.dot { width: 30px; height: 22px; border-radius: 6px; flex: none; }
.chip b { font-size: 11px; color: var(--gb-text); font-weight: 500; width: 90px; }
.chip span { font-size: 10px; color: var(--gb-dim); font-family: var(--gb-font-mono); }
.pill { display: inline-flex; align-items: center; gap: 7px; background: var(--gb-sel-bg); color: var(--gb-sel-text); border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
</style></head><body>
<div class="half">
  <div class="pill">auth-refactor</div>
  <div class="chips">
    <div class="chip"><span class="dot" style="background: var(--gb-accent);"></span><b>Accent</b><span>--gb-accent</span></div>
    <div class="chip"><span class="dot" style="background: var(--gb-row-sel);"></span><b>İkincil seçim</b><span>--gb-row-sel</span></div>
    <div class="chip"><span class="dot" style="background: var(--gb-hover);"></span><b>Hover</b><span>--gb-hover</span></div>
    <div class="chip"><span class="dot" style="background: var(--gb-badge-bg);"></span><b>Badge</b><span>--gb-badge-bg</span></div>
  </div>
</div>
<div class="half" data-theme="light">
  <div class="pill">auth-refactor</div>
  <div class="chips">
    <div class="chip"><span class="dot" style="background: var(--gb-accent);"></span><b>Accent</b><span>--gb-accent</span></div>
    <div class="chip"><span class="dot" style="background: var(--gb-row-sel);"></span><b>İkincil seçim</b><span>--gb-row-sel</span></div>
    <div class="chip"><span class="dot" style="background: var(--gb-hover); outline: 1px solid var(--gb-border-soft);"></span><b>Hover</b><span>--gb-hover</span></div>
    <div class="chip"><span class="dot" style="background: var(--gb-badge-bg);"></span><b>Badge</b><span>--gb-badge-bg</span></div>
  </div>
</div>
</body></html>
