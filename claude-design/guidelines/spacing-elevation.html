<!-- @dsCard group="Spacing" viewport="700x190" subtitle="Vibrancy + katmanlı gölge sistemi" name="Elevation & Vibrancy" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; font-family: var(--gb-font-ui); background: var(--gb-desktop); padding: 22px 16px; display: flex; gap: 18px; align-items: center; justify-content: center; }
.s { border-radius: var(--gb-radius-float); padding: 12px 16px; font-size: 11.5px; color: var(--gb-text); }
.cap { font-size: 9.5px; color: var(--gb-dim); font-family: var(--gb-font-mono); display: block; margin-top: 3px; }
</style></head><body>
<div class="s" style="background: var(--gb-surface-float); backdrop-filter: var(--gb-vibrancy-float); -webkit-backdrop-filter: var(--gb-vibrancy-float); box-shadow: var(--gb-shadow-float);">Yüzen pill<span class="cap">surface-float · vibrancy-float · shadow-float</span></div>
<div class="s" style="background: var(--gb-surface-menu); backdrop-filter: var(--gb-vibrancy); -webkit-backdrop-filter: var(--gb-vibrancy); box-shadow: var(--gb-shadow-menu); border-radius: var(--gb-radius-menu);">Bağlam menüsü<span class="cap">surface-menu · vibrancy · shadow-menu</span></div>
<div class="s" style="background: var(--gb-surface-alert); backdrop-filter: var(--gb-vibrancy-alert); -webkit-backdrop-filter: var(--gb-vibrancy-alert); box-shadow: var(--gb-shadow-alert); border-radius: var(--gb-radius-alert);">Alert<span class="cap">surface-alert · vibrancy-alert · shadow-alert</span></div>
<div class="s" style="background: var(--gb-bg); box-shadow: var(--gb-shadow-window); outline: 1px solid var(--gb-window-edge); outline-offset: -1px;">Pencere<span class="cap">shadow-window · window-edge</span></div>
</body></html>
