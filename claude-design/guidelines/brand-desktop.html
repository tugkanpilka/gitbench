<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; font-family: var(--gb-font-ui); display: flex; }
.half { flex: 1; height: 170px; position: relative; }
.half span { position: absolute; left: 12px; bottom: 10px; font-size: 10px; font-family: var(--gb-font-mono); padding: 3px 8px; border-radius: 5px; }
</style></head><body>
<div class="half" style="background: var(--gb-desktop);"><span style="color: #cfd2e0; background: rgba(20,21,28,.6);">--gb-desktop (dark)</span></div>
<div class="half" data-theme="light" style="background: var(--gb-desktop);"><span style="color: #44464f; background: rgba(255,255,255,.6);">--gb-desktop (light)</span></div>
</body></html>
