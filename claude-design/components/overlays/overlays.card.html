<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../gb-card-loader.js"></script>
<style>body { margin: 0; background: var(--gb-desktop); }</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
gbLoad("../../", ["components/core/Button.jsx", "components/core/SegmentedControl.jsx", "components/core/DiffStat.jsx", "components/overlays/ContextMenu.jsx", "components/overlays/AlertDialog.jsx", "components/overlays/FloatBar.jsx"], ["ContextMenu", "AlertDialog", "FloatBar"]).then((NS) => {
const { ContextMenu, AlertDialog, FloatBar, FloatBarDivider, SegmentedControl, DiffStat } = NS;

function Card() {
  const [view, setView] = React.useState("unified");
  return (
    <div style={{ display: "flex", gap: 22, padding: 18, alignItems: "flex-start" }}>
      <ContextMenu items={[
        { label: "Finder'da Göster" },
        { label: "Terminalde Aç", hint: "⌥⌘T" },
        { label: "Dal Adını Kopyala" },
        "—",
        { label: "Worktree'yi Kaldır…", destructive: true },
      ]}></ContextMenu>
      <AlertDialog inline
        icon={<img src="../../assets/gitbench-icon.svg" width="52" height="52" alt=""></img>}
        title="“auth-refactor” kaldırılsın mı?"
        body={<span>Worktree klasörü diskten silinecek. <span style={{ fontFamily: "var(--gb-font-mono)", fontSize: 10.5 }}>agent/auth-refactor</span> dalı silinmez.</span>}
        confirmLabel="Kaldır"></AlertDialog>
      <div style={{ position: "relative", flex: 1, height: 150, background: "var(--gb-bg)", borderRadius: 10, overflow: "hidden" }}>
        <FloatBar>
          <span style={{ fontSize: "var(--gb-text-md)", fontWeight: 600, color: "var(--gb-text)", whiteSpace: "nowrap" }}>auth-refactor</span>
          <DiffStat add={124} del={56}></DiffStat>
          <FloatBarDivider></FloatBarDivider>
          <SegmentedControl items={[{ value: "unified", label: "Unified" }, { value: "split", label: "Split" }]} value={view} onChange={setView}></SegmentedControl>
        </FloatBar>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Card></Card>);
});
</script>
</body></html>
