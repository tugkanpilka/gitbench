<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../gb-card-loader.js"></script>
<style>body { margin: 0; background: var(--gb-bg); }</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
gbLoad("../../", ["components/core/Button.jsx", "components/core/SegmentedControl.jsx", "components/core/Badge.jsx", "components/core/DiffStat.jsx"], ["Button", "SegmentedControl", "Badge", "DiffStat"]).then((NS) => {
const { Button, SegmentedControl, Badge, DiffStat } = NS;

function Card() {
  const [view, setView] = React.useState("unified");
  return (
    <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 14, fontFamily: "var(--gb-font-ui)" }}>
      <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
        <Button variant="primary" icon="＋">Depo Aç…</Button>
        <Button variant="destructive">Kaldır</Button>
        <Button variant="secondary">Vazgeç</Button>
        <Button icon="⌘">Depo Klonla…</Button>
      </div>
      <div style={{ display: "flex", gap: 18, alignItems: "center" }}>
        <SegmentedControl items={[{ value: "unified", label: "Unified" }, { value: "split", label: "Split" }]} value={view} onChange={setView}></SegmentedControl>
        <SegmentedControl items={[{ value: "flat", label: "Düz" }, { value: "tree", label: "Ağaç" }]} value="flat"></SegmentedControl>
        <Badge>8</Badge>
        <span style={{ background: "var(--gb-sel-bg)", borderRadius: 6, padding: "3px 8px" }}><Badge onSelection>8</Badge></span>
        <DiffStat add={124} del={56}></DiffStat>
        <DiffStat add={42} del={18} size={12}></DiffStat>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Card></Card>);
});
</script>
</body></html>
