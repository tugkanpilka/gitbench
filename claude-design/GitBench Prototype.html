<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitBench — Native macOS Prototip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 13px; }
  ::-webkit-scrollbar-thumb { background: rgba(128,128,134,.4); border-radius: 99px; border: 3.5px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(128,128,134,.6); border: 3.5px solid transparent; background-clip: padding-box; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="gitbench-data.jsx"></script>
<script type="text/babel" src="gitbench-themes.jsx"></script>
<script type="text/babel" src="gitbench-ui.jsx"></script>
<script type="text/babel" src="gitbench-native.jsx"></script>
<script type="text/babel" src="gitbench-proto-data.jsx"></script>
<script type="text/babel" src="gitbench-proto-diff.jsx"></script>
<script type="text/babel" src="gitbench-proto-app.jsx"></script>
<script type="text/babel" src="gitbench-proto-extras.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "diffStyle": "classic",
  "monoFont": "SF Mono (system)",
  "accent": "#0a6ce8"
}/*EDITMODE-END*/;

function ProtoApp() {
  const saved = React.useMemo(loadUiState, []);
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [light, setLight] = React.useState(saved.light ?? false);
  const [view, setView] = React.useState(saved.view || "unified");
  const [wtId, setWtId] = React.useState(saved.wtId || PROTO_WORKTREES[0].id);
  const [listMode, setListMode] = React.useState(saved.listMode || "flat");
  const [sidebarOpen, setSidebarOpen] = React.useState(saved.sidebarOpen ?? true);
  const [project, setProject] = React.useState(saved.projectId ? GB_PROJECTS.find((p) => p.id === saved.projectId) || null : null);
  const [worktrees, setWorktrees] = React.useState(PROTO_WORKTREES);
  const [menu, setMenu] = React.useState(null);       // {x, y, items}
  const [confirm, setConfirm] = React.useState(null); // {wt}
  const [activeIdx, setActiveIdx] = React.useState(0);
  const [collapsed, setCollapsed] = React.useState({});
  const scrollRef = React.useRef(null);
  const sectionRefs = React.useRef([]);
  const rafRef = React.useRef(0);

  React.useEffect(() => {
    try { localStorage.setItem(GB_LS_KEY, JSON.stringify({ light, view, wtId, listMode, sidebarOpen, projectId: project ? project.id : null })); } catch (e) {}
  }, [light, view, wtId, listMode, sidebarOpen, project]);

  const wt = worktrees.find((w) => w.id === wtId) || worktrees[0] || null;

  const t = React.useMemo(() => {
    const base = light ? MAC_THEMES.macLight : MAC_THEMES.macDark;
    return {
      ...base,
      mono: GB_MONOS[tw.monoFont] || base.mono,
      accent: tw.accent,
      accentBg: hexA(tw.accent, light ? 0.10 : 0.16),
      selBg: tw.accent,
    };
  }, [light, tw.monoFont, tw.accent]);

  const onScroll = React.useCallback(() => {
    cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => {
      const el = scrollRef.current;
      if (!el) return;
      const top = el.scrollTop + 60;
      let idx = 0;
      sectionRefs.current.forEach((s, i) => { if (s && s.offsetTop <= top) idx = i; });
      setActiveIdx(idx);
    });
  }, []);

  const pickFile = (i) => {
    const el = scrollRef.current, s = sectionRefs.current[i];
    if (!el || !s) return;
    setCollapsed((c) => ({ ...c, [i]: false }));
    el.scrollTo({ top: s.offsetTop, behavior: "smooth" });
    setActiveIdx(i);
  };

  const selectWt = (id) => {
    if (id === wtId) return;
    setWtId(id);
    setActiveIdx(0);
    setCollapsed({});
    sectionRefs.current = [];
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  };

  const openWtMenu = (x, y, w) => {
    setMenu({ x, y, items: [
      { label: "Finder'da Göster" },
      { label: "Terminalde Aç", hint: "⌥⌘T" },
      { label: "Dal Adını Kopyala", onClick: () => {} },
      "—",
      { label: "Worktree'yi Kaldır…", destructive: true, onClick: () => setConfirm({ wt: w }) },
    ]});
  };

  const openProjMenu = (x, y) => {
    setMenu({ x, y, items: [
      { label: "Finder'da Göster" },
      { label: "Yenile", hint: "⌘R" },
      "—",
      { label: "Projeyi Kapat…", onClick: () => { setProject(null); setWorktrees(PROTO_WORKTREES); } },
    ]});
  };

  const removeWt = (w) => {
    setConfirm(null);
    setWorktrees((list) => {
      const next = list.filter((x) => x.id !== w.id);
      if (w.id === wtId && next.length) { setWtId(next[0].id); setActiveIdx(0); setCollapsed({}); sectionRefs.current = []; }
      return next;
    });
  };

  const desktop = light
    ? "radial-gradient(1000px 700px at 18% 10%, #ffd9a8 0%, transparent 55%), radial-gradient(1100px 800px at 85% 22%, #ffb3c8 0%, transparent 60%), radial-gradient(1200px 900px at 50% 98%, #9ec5ff 0%, transparent 65%), #e8edf5"
    : "radial-gradient(1000px 700px at 18% 10%, #4a3a78 0%, transparent 55%), radial-gradient(1100px 800px at 85% 22%, #7a3358 0%, transparent 60%), radial-gradient(1200px 900px at 50% 98%, #1f4d7a 0%, transparent 65%), #14151c";

  if (!project) {
    return (
      <div style={{ position: "fixed", inset: 0, background: desktop, display: "flex", alignItems: "center", justifyContent: "center", transition: "background .3s ease" }}>
        <PWelcome t={t} light={light} onOpen={(p) => { setProject(p); setWorktrees(PROTO_WORKTREES); setWtId(PROTO_WORKTREES[0].id); setActiveIdx(0); }}></PWelcome>
      </div>
    );
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: desktop, display: "flex", alignItems: "center", justifyContent: "center", transition: "background .3s ease" }}>
      <div data-screen-label="GitBench" style={{ width: "calc(100% - 48px)", height: "calc(100% - 48px)", maxWidth: 1680, borderRadius: 11, overflow: "hidden", display: "flex", position: "relative", boxShadow: "0 30px 70px rgba(0,0,0,.45), 0 0 0 .5px rgba(0,0,0,.3)", outline: light ? "none" : "1px solid rgba(255,255,255,.12)", outlineOffset: -1 }}>
        <PSidebar t={t} wts={worktrees} sel={wtId} onSelect={selectWt} activeIdx={activeIdx} onPickFile={pickFile} listMode={listMode} open={sidebarOpen} onWtMenu={openWtMenu} project={project} onProjMenu={openProjMenu}></PSidebar>
        <PSidebarFloatBar t={t} open={sidebarOpen} onOpen={setSidebarOpen} listMode={listMode} onListMode={setListMode}></PSidebarFloatBar>
        <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column", background: t.bg, transition: "background .2s ease", position: "relative" }}>
          <div ref={scrollRef} onScroll={onScroll} style={{ flex: 1, minHeight: 0, overflowY: "auto", position: "relative" }}>
            {!wt && (
              <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8, fontFamily: t.ui }}>
                <span style={{ fontSize: 14, fontWeight: 600, color: t.dim }}>Worktree yok</span>
                <span style={{ fontSize: 12, color: t.faint }}>Bir worktree ekleyince diff'leri burada göreceksin.</span>
              </div>
            )}
            {wt && wt.filesList.map((f, i) => (
              <ProtoFileSection key={wt.id + f.dir + f.name} t={t} file={f} view={view} mode={tw.diffStyle} mono={t.mono}
                collapsed={!!collapsed[i]}
                onToggle={() => setCollapsed((c) => ({ ...c, [i]: !c[i] }))}
                refCb={(el) => { sectionRefs.current[i] = el; }}></ProtoFileSection>
            ))}
            {wt && (
            <div style={{ height: 140, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: t.ui, fontSize: 11.5, color: t.faint }}>
              {wt.filesList.length} dosya · +{wt.add} −{wt.del}
            </div>
            )}
          </div>
          {wt && <PFloatBar t={t} wt={wt} view={view} onView={setView} light={light} onLight={(v) => setLight(v)}></PFloatBar>}
        </div>
      </div>

      {menu && <PMenu t={t} x={menu.x} y={menu.y} items={menu.items} onClose={() => setMenu(null)}></PMenu>}
      {confirm && (
        <PConfirm t={t} light={light}
          title={`“${confirm.wt.name}” kaldırılsın mı?`}
          body={<span>Worktree klasörü diskten silinecek. <span style={{ fontFamily: t.mono, fontSize: 10.5 }}>{confirm.wt.branch}</span> dalı silinmez.</span>}
          confirmLabel="Kaldır"
          onCancel={() => setConfirm(null)}
          onConfirm={() => removeWt(confirm.wt)}></PConfirm>
      )}

      <TweaksPanel>
        <TweakSection label="Diff"></TweakSection>
        <TweakRadio label="Renklendirme" value={tw.diffStyle} options={["classic", "bars", "word"]} onChange={(v) => setTweak("diffStyle", v)}></TweakRadio>
        <TweakSection label="Tipografi"></TweakSection>
        <TweakSelect label="Mono font" value={tw.monoFont} options={Object.keys(GB_MONOS)} onChange={(v) => setTweak("monoFont", v)}></TweakSelect>
        <TweakSection label="Renk"></TweakSection>
        <TweakColor label="Accent" value={tw.accent} options={GB_ACCENTS} onChange={(v) => setTweak("accent", v)}></TweakColor>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ProtoApp></ProtoApp>);
</script>
</body>
</html>
