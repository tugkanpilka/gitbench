name: Release

# Build a signed + notarized macOS app and publish it — together with the
# electron-updater feed (latest-mac.yml + blockmaps) — to a draft GitHub Release
# whenever a version tag is pushed, e.g. `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  release:
    name: Build & publish macOS (.dmg + .zip)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build, sign, notarize and publish
        # electron-builder publishes to GitHub itself (provider/releaseType in
        # electron-builder.yml), so the release carries latest-mac.yml for
        # auto-update. releaseType is draft — review the assets, then publish.
        run: npm run build && npx electron-builder --mac --publish always
        env:
          # built-in Actions token; has contents:write on this repo.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Same secret scheme as the Docbook desktop pipeline.
          # CSC_LINK = base64 .p12 (Developer ID Application), CSC_KEY_PASSWORD = its password.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          # electron-builder's notarytool path reads APPLE_APP_SPECIFIC_PASSWORD;
          # APPLE_ID_PASS kept for parity with the Docbook setup.
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASS }}
          APPLE_ID_PASS: ${{ secrets.APPLE_ID_PASS }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
